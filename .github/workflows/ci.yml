name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # Job 1: Go lint + module verification + build + race-detected tests
  # ---------------------------------------------------------------------
  lint-and-test:
    name: Go Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify Go version (project requires 1.26.x)
        run: go version | grep -E "go1\.26(\.|$)"

      - name: Verify module checksums
        run: go mod verify

      - name: Check go.mod / go.sum tidiness
        run: |
          go mod tidy
          if ! git diff --quiet -- go.mod go.sum; then
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' locally and commit."
            git diff -- go.mod go.sum
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

      - name: Build all packages
        run: go build ./...

      - name: Test with coverage
        run: make test-cover

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            cover-report.txt
          retention-days: 7

  # ---------------------------------------------------------------------
  # Job 2: "premonition" Python tests (scripts/ directory)
  # ---------------------------------------------------------------------
  premonition-test:
    name: Premonition Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./scripts
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry 2.4.1
        run: python -m pip install --no-cache-dir poetry==2.4.1

      - name: Configure Poetry (in-project venv)
        run: poetry config virtualenvs.in-project true

      - name: Restore cached .venv
        uses: actions/cache@v4
        id: cache-venv
        with:
          path: ./scripts/.venv
          key: premonition-venv-${{ hashFiles('scripts/poetry.lock') }}
          restore-keys: |
            premonition-venv-

      - name: Install dependencies (deterministic, locked)
        run: poetry install --with dev --no-interaction --no-ansi

      - name: Verify lockfile freshness
        run: |
          poetry lock
          if ! git diff --quiet -- poetry.lock; then
            echo "::error::poetry.lock is out of sync. Run 'poetry lock' locally and commit."
            git diff -- poetry.lock
            exit 1
          fi

      - name: Run pytest
        run: poetry run pytest -v

  # ---------------------------------------------------------------------
  # Job 3: tv-collector Python tests
  # ---------------------------------------------------------------------
  tv-collector-test:
    name: TradingView Collector Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tv-collector
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry 2.4.1
        run: python -m pip install --no-cache-dir poetry==2.4.1

      - name: Configure Poetry (in-project venv)
        run: poetry config virtualenvs.in-project true

      - name: Restore cached .venv
        uses: actions/cache@v4
        id: cache-venv
        with:
          path: ./tv-collector/.venv
          key: tv-collector-venv-${{ hashFiles('tv-collector/poetry.lock') }}
          restore-keys: |
            tv-collector-venv-

      - name: Install dependencies (deterministic, locked)
        run: poetry install --with dev --no-interaction --no-ansi

      - name: Verify lockfile freshness
        run: |
          poetry lock
          if ! git diff --quiet -- poetry.lock; then
            echo "::error::poetry.lock is out of sync. Run 'poetry lock' locally and commit."
            git diff -- poetry.lock
            exit 1
          fi

      - name: Run pytest
        run: poetry run pytest ./tests -v